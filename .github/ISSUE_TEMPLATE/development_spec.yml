name: "🤖 AI 개발 명세"
description: "AI 또는 개발자가 바로 구현할 수 있는 단위로 요구사항과 검증 방법을 고정합니다."
title: "[개발] "
labels: ["🛠️ 작업", "✅ 테스트", "👀 검토필요"]
body:
  - type: markdown
    attributes:
      value: |
        구현 전에 범위와 인수 조건을 확정합니다. 결정되지 않은 내용은 추측해서 구현하지 않습니다.
  - type: textarea
    id: goal
    attributes:
      label: "목표와 사용자 가치"
      description: "누구의 어떤 문제를 해결하고, 완료 후 무엇이 달라지는지 적어 주세요."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "배경과 근거"
      description: "관련 정책, 설계 문서, 기존 동작과 결정 사항을 링크해 주세요."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: "구현 범위"
      placeholder: |
        - 포함: ...
        - 포함: ...
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: "제외 범위"
      description: "이번 PR에서 의도적으로 다루지 않을 내용을 적어 주세요."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "인수 조건"
      description: "관찰 가능한 결과를 Given/When/Then 또는 체크리스트로 작성해 주세요."
      placeholder: |
        - [ ] Given ..., When ..., Then ...
        - [ ] 실패 상황에서는 ...
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: "API·데이터 계약"
      description: "요청, 응답, 오류, DB migration, 외부 API 영향이 없으면 '없음'으로 적어 주세요."
    validations:
      required: true
  - type: textarea
    id: test_plan
    attributes:
      label: "테스트 계획"
      description: "먼저 실패시킬 테스트와 단위·슬라이스·통합 테스트 범위를 적어 주세요."
      placeholder: |
        - RED: ...
        - 단위 테스트: ...
        - 통합 테스트: ...
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: "보안·운영 위험"
      description: "인증, 개인정보, secret, 비용, 배포와 롤백 영향을 적어 주세요. 없으면 '없음'으로 적어 주세요."
    validations:
      required: true
  - type: textarea
    id: decisions
    attributes:
      label: "구현 전 확인이 필요한 결정"
      description: "담당자 확인 없이는 진행하면 안 되는 항목을 적어 주세요. 없으면 '없음'으로 적어 주세요."
    validations:
      required: true
