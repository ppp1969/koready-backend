name: "✨ 기능 요청"
description: "새 기능 또는 기존 기능 개선 아이디어를 제안합니다."
title: "[기능] "
labels: ["✨ 기능", "👀 검토필요"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "문제 또는 배경"
      description: "이 기능이 왜 필요한지 설명해 주세요."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "제안"
      description: "원하는 동작, API, 정책을 구체적으로 적어 주세요."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "완료 조건"
      description: "어떤 기준을 만족하면 완료로 볼 수 있나요?"
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: "추가 메모"
      description: "참고 링크, 스크린샷, 관련 이슈가 있으면 적어 주세요."
    validations:
      required: false

