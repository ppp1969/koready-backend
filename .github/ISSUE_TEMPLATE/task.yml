name: "🛠️ 작업 항목"
description: "구현, 설정, 리팩터링 등 실행할 작업을 정리합니다."
title: "[작업] "
labels: ["🛠️ 작업", "👀 검토필요"]
body:
  - type: textarea
    id: goal
    attributes:
      label: "목표"
      description: "이번 작업으로 달성하려는 결과를 적어 주세요."
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: "작업 목록"
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: "완료 기준"
      description: "작업 완료를 판단할 기준을 적어 주세요."
    validations:
      required: true

