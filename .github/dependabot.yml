version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    ignore:
      - dependency-name: "gradle-wrapper"
        update-types:
          - "version-update:semver-major"
    labels:
      - "🧰 인프라"
      - "🔽 낮음"
    commit-message:
      prefix: "chore"
      include: "scope"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    groups:
      node24-compatible-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "gradle/actions"
        update-types:
          - "version-update:semver-major"
    labels:
      - "🧰 인프라"
      - "🔽 낮음"
    commit-message:
      prefix: "chore"
      include: "scope"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    ignore:
      - dependency-name: "eclipse-temurin"
        update-types:
          - "version-update:semver-major"
    labels:
      - "🧰 인프라"
      - "🔽 낮음"
    commit-message:
      prefix: "chore"
      include: "scope"
