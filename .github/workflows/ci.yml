name: "✅ CI"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: "Gradle Test"
    runs-on: ubuntu-latest

    steps:
      - name: "소스 체크아웃"
        uses: actions/checkout@v7

      - name: "Java 21 설정"
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: "Gradle 설정"
        uses: gradle/actions/setup-gradle@v5

      - name: "품질 게이트 실행"
        run: ./gradlew clean check

      - name: "테스트와 커버리지 보고서 업로드"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-verification-reports
          path: |
            build/reports/tests/
            build/reports/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest

    steps:
      - name: "소스 체크아웃"
        uses: actions/checkout@v7

      - name: "컨테이너 이미지 빌드"
        run: docker build --tag koready-backend:ci .
