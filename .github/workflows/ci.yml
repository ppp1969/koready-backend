name: "✅ CI"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: "Gradle Test"
    runs-on: ubuntu-latest

    steps:
      - name: "소스 체크아웃"
        uses: actions/checkout@v4

      - name: "Java 21 설정"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: "Gradle 설정"
        uses: gradle/actions/setup-gradle@v4

      - name: "테스트 실행"
        run: ./gradlew clean test

  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest

    steps:
      - name: "소스 체크아웃"
        uses: actions/checkout@v4

      - name: "컨테이너 이미지 빌드"
        run: docker build --tag koready-backend:ci .
