name: "🔒 Secret Scan"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gitleaks:
    name: "Gitleaks"
    runs-on: ubuntu-latest

    steps:
      - name: "소스 체크아웃"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "민감정보 스캔"
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
