name: koready

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-koready}
      MYSQL_USER: ${DB_USERNAME:-koready}
      MYSQL_PASSWORD: ${DB_PASSWORD:-koready-local}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-koready-root-local}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    profiles: ["full"]
    image: koready-backend:local
    build:
      context: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${DB_DATABASE:-koready}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      DB_USERNAME: ${DB_USERNAME:-koready}
      DB_PASSWORD: ${DB_PASSWORD:-koready-local}
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"

volumes:
  mysql-data:
