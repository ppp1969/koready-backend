  /admin/data-quality/summary:
    get:
      tags: [Admin Audit]
      operationId: getDataQualitySummary
      summary: 관광지 데이터 품질 요약 조회
      description: |
        활성 장소의 이미지, 좌표, 주소, KO/EN 연결, 관광유형 매핑, 큐레이션 준비 상태를 집계합니다.
        큐레이션 편집 화면에서 사용 불가 장소의 원인을 설명하는 기준 데이터로 활용합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/DataQualitySuccess'
