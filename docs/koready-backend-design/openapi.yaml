          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/DownloadUrlSuccess'
        '410':
          $ref: '#/components/responses/Gone'
  /admin/batch-jobs:
    get:
      tags: [Admin Batch]
      operationId: getBatchJobs
      summary: 수집·가공 배치 목록 조회
      description: |
        jobType과 status로 배치를 검색해 시작·종료 시각, 성공·실패 item 수를 표시합니다.
        202로 접수된 작업의 진행 상태 확인에도 사용합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      parameters:
        - name: jobType
          in: query
          schema:
            $ref: '#/components/schemas/BatchJobType'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/BatchJobStatus'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Size100'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/BatchJobListSuccess'
    post:
      tags: [Admin Batch]
      operationId: createBatchJob
      summary: 수집·가공 배치 수동 실행
      description: |
        관리자가 jobType, 대상 범위, dryRun 여부를 확인한 뒤 실행합니다.
        202는 접수 성공일 뿐 완료가 아니므로 반환 jobId로 상세 상태를 polling합니다. 동일 실행 충돌은 409입니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR]
      requestBody:
        required: true
        content:
          application/json:
