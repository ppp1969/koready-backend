  schemas:
    ApiEnvelope:
      type: object
      required: [success, code, message, data, traceId]
      description: 공통 성공 메타데이터. 실제 data 타입은 각 operation 전용 Envelope가 정의함
      properties:
        success:
          type: boolean
          enum: [true]
        code:
          type: string
          example: OK
        message:
          type: string
        data:
          description: operation 전용 Envelope에서 구체 타입을 정의하는 성공 응답 본문
        traceId:
          type: string
    ApiError:
      type: object
      required: [success, code, message, traceId]
      properties:
        success:
          type: boolean
          enum: [false]
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          description: 입력 필드별 오류. 비필드 오류에서는 빈 배열 또는 생략 가능
          items:
            $ref: '#/components/schemas/ApiFieldError'
        traceId:
          type: string
    CandidateSetEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OnboardingCandidateSetResponse'
    OnboardingCandidateSetResponse:
      type: object
      required: [candidateSetId, version, status, publishedAt, minSelection, maxSelection, items]
      properties:
        candidateSetId:
          type: string
          example: onb-curation-2026-07-v1
        version:
          type: integer
          minimum: 1
          example: 1
        status:
          $ref: '#/components/schemas/CandidateSetStatus'
        publishedAt:
          type: string
          format: date-time
        minSelection:
          type: integer
          enum: [1]
        maxSelection:
          type: integer
          enum: [3]
        items:
          type: array
          minItems: 10
          maxItems: 10
          items:
            $ref: '#/components/schemas/OnboardingCandidateItem'
    OnboardingCandidateItem:
      type: object
      required: [placeId, title, imageUrl, serviceRegionCode, serviceRegionName, tags, curatorMessage, displayOrder]
      properties:
        placeId:
          type: integer
          format: int64
          example: 1001
        title:
          type: string
          example: 김천 김밥축제
        imageUrl:
          type: string
          format: uri
        serviceRegionCode:
          $ref: '#/components/schemas/ServiceRegionCode'
        serviceRegionName:
          type: string
          example: 경상
        travelStyle:
          $ref: '#/components/schemas/TravelStyle'
        tags:
          type: array
          items:
            type: string
          example: [지역축제, 로컬음식, 체험]
        curatorMessage:
          type: string
          example: 김밥을 주제로 먹고, 만들고, 즐기는 지역 축제예요.
        displayOrder:
          type: integer
          minimum: 1
          maximum: 10
    LocationSearchEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LocationSearchResponse'
    LocationSearchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LocationSearchItem'
    LocationSearchItem:
      type: object
      required: [searchResultToken, provider, resultType, name, latitude, longitude, sido, sigungu, serviceRegionCode]
      properties:
        searchResultToken:
          type: string
          description: 프론트가 해석하지 않고 위치 저장 요청에 그대로 제출하는 10분 유효 token
          example: locsrch_opaque_signed_token
        provider:
          type: string
          enum: [KAKAO]
        resultType:
          $ref: '#/components/schemas/LocationSearchResultType'
        providerPlaceId:
          type: string
          nullable: true
          example: '123456789'
        name:
          type: string
          example: 성신여자대학교
        roadAddress:
          type: string
          nullable: true
          example: 서울특별시 성북구 보문로34다길 2
        address:
          type: string
          nullable: true
          example: 서울특별시 성북구 돈암동 173-1
        latitude:
          type: number
          format: double
          example: 37.5913
        longitude:
          type: number
          format: double
          example: 127.0221
        sido:
          type: string
          example: 서울특별시
        sigungu:
          type: string
          example: 성북구
        dong:
          type: string
          nullable: true
          example: 돈암동
        serviceRegionCode:
          $ref: '#/components/schemas/ServiceRegionCode'
    UserLocationEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserLocationResponse'
    UserLocationResponse:
      type: object
      required: [locationId, displayName, latitude, longitude, serviceRegionCode, default, createdAt]
      properties:
        locationId:
          type: integer
          format: int64
        displayName:
          type: string
        customLabel:
          type: string
          nullable: true
        roadAddress:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        serviceRegionCode:
          $ref: '#/components/schemas/ServiceRegionCode'
        default:
          type: boolean
        createdAt:
          type: string
          format: date-time
    LanguageCode:
      type: string
      description: KO=한국어, EN=English
      enum: [KO, EN]
    SocialProvider:
      type: string
      description: 소셜 인증 제공자. KAKAO는 위치 provider이며 로그인 enum에 포함하지 않음
      enum: [GOOGLE, APPLE]
    ExternalApiProvider:
      type: string
      description: KTO=한국관광공사, TMAP=대중교통 경로, KAKAO=위치 검색, AI=번역·가공
      enum: [KTO, TMAP, KAKAO, AI]
    TravelStyle:
      type: string
      description: 로컬 맛집, 지역 축제, 전통시장, 문화체험, 자연 명소, 전시·미술관, 드라마 촬영지
      enum: [LOCAL_FOOD, LOCAL_FESTIVAL, TRADITIONAL_MARKET, CULTURE_EXPERIENCE, NATURE, EXHIBITION_MUSEUM, DRAMA_LOCATION]
    BuddyStyle:
      type: string
      description: Buddy 프로필 전용 관심사. 온보딩 TravelStyle과 다른 enum
      enum: [TRADITIONAL_CULTURE, CAFE_TOUR, FOODIE, PHOTOGRAPHY, HANOK_EXPERIENCE, QUIET_TRAVEL]
    KoreanLevel:
      type: string
      description: 한국어 초급, 중급, 고급. NONE과 NATIVE는 허용하지 않음
      enum: [BEGINNER, INTERMEDIATE, ADVANCED]
    ServiceRegionCode:
      type: string
      description: 서울, 경기·인천, 강원, 충청, 전라, 경상, 제주 7개 서비스 권역
      enum: [SEOUL, GYEONGGI, GANGWON, CHUNGCHEONG, JEOLLA, GYEONGSANG, JEJU]
    SortType:
      type: string
      description: 추천 점수순 또는 행사 종료 마감순
      enum: [RECOMMENDED, DEADLINE]
    DateFilterType:
      type: string
      description: |
        월별 추천에서 선택 연월과 교집합으로 적용하는 날짜 범위입니다.
        ALL은 선택 연월 전체, THIS_WEEK는 Asia/Seoul 오늘의 월요일~일요일,
        THIS_MONTH는 오늘이 속한 달, NEXT_MONTH는 다음 달입니다.
        CUSTOM이면 customStartDate와 customEndDate가 모두 필요합니다.
      enum: [ALL, THIS_WEEK, THIS_MONTH, NEXT_MONTH, CUSTOM]
    FestivalOccurrenceStatus:
      type: string
      description: Asia/Seoul 조회일과 해당 회차의 개최 기간으로 계산하는 축제 상태
      enum: [UPCOMING, ONGOING, ENDED]
    RecommendationScope:
      type: string
      description: NEARBY는 GPS 반경이 아니라 기본 위치와 같은 서비스 권역, NATIONWIDE는 전국
      enum: [NEARBY, NATIONWIDE]
    RecommendationEventType:
      type: string
      description: 추천 카드 탐색 이벤트. CARD_SERVED는 서버 전용이라 포함하지 않음
      enum: [CARD_EXPANDED, CARD_PREVIOUS, CARD_NEXT, PLACE_DETAIL_CLICKED, PLACE_SAVED, PLACE_UNSAVED, ROUTE_OPENED]
    RouteMode:
      type: string
      description: Koready가 TMAP 원본을 단순화한 화면 표시용 이동수단
      enum: [WALK, BUS, SUBWAY, EXPRESS_BUS, TRAIN, AIRPLANE, FERRY, SHUTTLE_BUS]
    Difficulty:
      type: string
      description: 환승, 도보, 총시간을 서버 알고리즘으로 계산한 이동 난이도
      enum: [EASY, NORMAL, HARD]
    DayTripStatus:
      type: string
      description: TMAP 원본 편도 10800초 미만만 당일치기 가능, 이상은 숙박 권장
      enum: [DAY_TRIP_AVAILABLE, STAY_RECOMMENDED]
    CandidateSetStatus:
      type: string
      description: 관리자 큐레이션 초안, 불변 발행본, 신규 노출 중지 보관본
      enum: [DRAFT, PUBLISHED, ARCHIVED]
    HoriTipStatus:
      type: string
      description: 운영 팁 초안, 사용자 노출 중, 일시 중지, 이력 보관
      enum: [DRAFT, ACTIVE, INACTIVE, ARCHIVED]
    HoriTipStatusChangeTarget:
      type: string
      description: 상태 변경 API가 허용하는 대상 상태. 생성 시에만 DRAFT가 자동 지정됨
      enum: [ACTIVE, INACTIVE, ARCHIVED]
    HoriTipScopeType:
      type: string
      description: 모든 경로 또는 지정 목적지 장소에만 적용
      enum: [ALL_ROUTES, DESTINATION_PLACES]
    HoriTipPlacement:
      type: string
      description: 경로 요약 상단 또는 처음 일치한 구간 뒤에 노출
      enum: [TOP_SUMMARY, AFTER_SEGMENT]
    HoriTipSource:
      type: string
      description: Hori Tip 본문은 운영진 저장 데이터만 허용
      enum: [OPERATOR_CURATED]
    LocationSearchResultType:
      type: string
      description: ADDRESS=주소 검색 결과, PLACE=학교·건물·장소 키워드 결과
      enum: [ADDRESS, PLACE]
    BatchJobStatus:
      type: string
      description: 비동기 배치 실행 상태
      enum: [PENDING, RUNNING, COMPLETED, FAILED, PARTIAL_FAILED]
    BatchJobType:
      type: string
      description: KTO 동기화·상세·영문·번역·이미지 보강 작업 유형
      enum: [KTO_DAILY_SYNC, KTO_DETAIL_ENRICHMENT, KTO_EN_SYNC, AI_TRANSLATION, IMAGE_ENRICHMENT]
    SocialLoginRequest:
      type: object
      required: [provider, deviceId]
      properties:
        provider:
          $ref: '#/components/schemas/SocialProvider'
        idToken:
          type: string
          nullable: true
        authorizationCode:
          type: string
          nullable: true
        deviceId:
          type: string
          minLength: 1
          maxLength: 100
        expoPushToken:
          type: string
          nullable: true
    RefreshTokenRequest:
      type: object
      required: [refreshToken, deviceId]
      properties:
        refreshToken:
          type: string
          minLength: 1
        deviceId:
          type: string
          minLength: 1
          maxLength: 100
    TermAgreementsRequest:
      type: object
      required: [agreements]
      properties:
        agreements:
          type: array
          minItems: 1
          items:
            type: object
            required: [termVersionId, agreed]
            properties:
              termVersionId:
                type: integer
                format: int64
              agreed:
                type: boolean
    LanguageRequest:
      type: object
      required: [language]
      properties:
        language:
          $ref: '#/components/schemas/LanguageCode'
    OnboardingRequest:
      type: object
      required: [currentLocationId, travelStyles, candidateSetId, candidateSetVersion, selectedPreferencePlaceIds]
      properties:
        currentLocationId:
          type: integer
          format: int64
        travelStyles:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          items:
            $ref: '#/components/schemas/TravelStyle'
        candidateSetId:
          type: string
        candidateSetVersion:
          type: integer
          minimum: 1
        selectedPreferencePlaceIds:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: integer
            format: int64
    CreateLocationRequest:
      type: object
      required: [searchResultToken, setDefault]
      properties:
        searchResultToken:
          type: string
          minLength: 1
          description: 위치 검색 응답에서 받은 10분 유효 서명 token
        customLabel:
          type: string
          nullable: true
          maxLength: 30
        setDefault:
          type: boolean
    CreateCandidateSetRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
        copyFromSetId:
          type: string
          nullable: true
    CandidateSetItemInput:
      type: object
      required: [placeId, displayOrder, curatorMessageKo, displayTags]
      properties:
        placeId:
          type: integer
          format: int64
        displayOrder:
          type: integer
          minimum: 1
          maximum: 10
        representativeImageId:
          type: integer
          format: int64
          nullable: true
          description: 생략하면 장소의 KTO 대표 이미지를 사용합니다. 값이 있으면 해당 장소 이미지 소유권 검증을 통과해야 발행할 수 있습니다.
        curatorMessageKo:
          type: string
          minLength: 1
          maxLength: 160
        curatorMessageEn:
          type: string
          maxLength: 240
          nullable: true
        displayTags:
          type: array
          maxItems: 5
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 30
        editorNote:
          type: string
          maxLength: 500
          nullable: true
    UpdateCandidateSetRequest:
      type: object
      required: [title, items]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
        items:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/CandidateSetItemInput'
    HoriTipScope:
      type: object
      required: [scopeType, destinationPlaceIds]
      properties:
        scopeType:
          $ref: '#/components/schemas/HoriTipScopeType'
        destinationPlaceIds:
          type: array
          maxItems: 100
          uniqueItems: true
          description: DESTINATION_PLACES이면 1개 이상 필수, ALL_ROUTES이면 빈 배열
          items:
            type: integer
            format: int64
          example: [1001]
    HoriTipTrigger:
      type: object
      description: 값이 있는 조건 그룹은 AND, 각 ContainsAny 배열 안의 값은 OR로 평가
      required: [segmentModes, routeNameContainsAny, segmentStartNameContainsAny, segmentEndNameContainsAny, minProviderTotalTimeSeconds, minTransferCount, minTotalWalkDistanceMeters]
      properties:
        segmentModes:
          type: array
          maxItems: 8
          uniqueItems: true
          items:
            $ref: '#/components/schemas/RouteMode'
          example: [TRAIN]
        routeNameContainsAny:
          type: array
          maxItems: 20
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 80
          example: [KTX, KTX-산천, KTX이음]
        segmentStartNameContainsAny:
          type: array
          maxItems: 20
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 100
        segmentEndNameContainsAny:
          type: array
          maxItems: 20
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 100
          example: [김천(구미)역]
        minProviderTotalTimeSeconds:
          type: integer
          minimum: 0
          nullable: true
          description: TMAP 원본 totalTime 기준. 표시용 분 반올림 값을 사용하지 않음
        minTransferCount:
          type: integer
          minimum: 0
          nullable: true
        minTotalWalkDistanceMeters:
          type: integer
          minimum: 0
          nullable: true
    HoriTipTranslationInput:
      type: object
      required: [language, body]
      properties:
        language:
          $ref: '#/components/schemas/LanguageCode'
        body:
          type: string
          minLength: 1
          maxLength: 300
          example: 김천역과 김천(구미)역은 다른 역이에요.
    HoriTipEditableFields:
      type: object
      required: [placement, priority, scope, trigger, translations]
      properties:
        placement:
          $ref: '#/components/schemas/HoriTipPlacement'
        priority:
          type: integer
          minimum: 0
          maximum: 1000
          example: 100
        scope:
          $ref: '#/components/schemas/HoriTipScope'
        trigger:
          $ref: '#/components/schemas/HoriTipTrigger'
        translations:
          type: array
          minItems: 1
          maxItems: 2
          uniqueItems: true
          description: DRAFT는 일부 언어를 허용하지만 ACTIVE 전환에는 KO와 EN이 모두 필요
          items:
            $ref: '#/components/schemas/HoriTipTranslationInput'
        validFrom:
          type: string
          format: date-time
          nullable: true
        validUntil:
          type: string
          format: date-time
          nullable: true
        operatorNote:
          type: string
          maxLength: 500
          nullable: true
          description: 사용자에게 노출하지 않는 운영 메모
    CreateHoriTipRequest:
      allOf:
        - $ref: '#/components/schemas/HoriTipEditableFields'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              pattern: '^TIP_[A-Z0-9_]+$'
              minLength: 5
              maxLength: 80
              description: 생성 후 변경할 수 없는 안정 식별자
              example: TIP_GIMCHEON_GUMI_STATION
    UpdateHoriTipRequest:
      allOf:
        - $ref: '#/components/schemas/HoriTipEditableFields'
        - type: object
          required: [version]
          properties:
            version:
              type: integer
              minimum: 1
              description: 상세 조회에서 받은 현재 version
    UpdateHoriTipStatusRequest:
      type: object
      required: [status, version, reason]
      properties:
        status:
          $ref: '#/components/schemas/HoriTipStatusChangeTarget'
        version:
          type: integer
          minimum: 1
        reason:
          type: string
          minLength: 1
          maxLength: 500
          example: 운영 검수 완료
    RecommendationDeckRequest:
      type: object
      required: [scope, size]
      properties:
        scope:
          $ref: '#/components/schemas/RecommendationScope'
        originLocationId:
          type: integer
          format: int64
          nullable: true
        size:
          type: integer
          minimum: 1
          maximum: 50
    RecommendationEventRequest:
      type: object
      required: [placeId, eventType]
      properties:
        placeId:
          type: integer
          format: int64
        eventType:
          $ref: '#/components/schemas/RecommendationEventType'
        occurredAt:
          type: string
          format: date-time
          nullable: true
    PlaceDetailEnvelope:
      type: object
      required: [success, code, message, data, traceId]
      properties:
        success:
          type: boolean
          enum: [true]
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/PlaceDetail'
        traceId:
          type: string
    PlaceDetail:
      type: object
      required: [placeId, title, serviceRegionCode, locationText, address, latitude, longitude, images, tags, isSaved, description, relatedPlaces, availableTabs]
      properties:
        placeId:
          type: integer
          format: int64
          example: 1001
        title:
          type: string
          example: 김천 김밥축제
        serviceRegionCode:
          $ref: '#/components/schemas/ServiceRegionCode'
        locationText:
          type: string
          example: 경상북도 김천시
        address:
          type: string
          nullable: true
          example: 경상북도 김천시 삼락동 488-1
        latitude:
          type: number
          format: double
          nullable: true
          example: 36.1398
        longitude:
          type: number
          format: double
          nullable: true
          example: 128.1136
        operatingHours:
          type: string
          nullable: true
        operatingPeriod:
          type: string
          nullable: true
        closedDays:
          type: string
          nullable: true
        usageFee:
          type: string
          nullable: true
        parkingInfo:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/PlaceImage'
        tags:
          type: array
          items:
            type: string
        isSaved:
          type: boolean
          description: 익명 조회에서는 항상 false
        description:
          allOf:
            - $ref: '#/components/schemas/PlaceDescription'
          nullable: true
          description: 검증된 원문 설명이 없으면 null
        relatedPlaces:
          type: array
          items:
            $ref: '#/components/schemas/RelatedPlace'
        availableTabs:
          type: array
          items:
            $ref: '#/components/schemas/AvailablePlaceTab'
    RouteRequest:
      type: object
      required: [originLocationId, destinationPlaceId]
      properties:
        originLocationId:
          type: integer
          format: int64
        destinationPlaceId:
          type: integer
          format: int64
        departureAt:
          type: string
          format: date-time
          nullable: true
          description: 생략하면 현재 시각. 서버가 Asia/Seoul의 TMAP searchDttm으로 변환
    RouteEnvelope:
      type: object
