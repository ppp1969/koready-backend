      enum: [TERMS, LANGUAGE, ONBOARDING, COMPLETED]
    SignupStatus:
      type: string
      description: 서버가 계산한 가입 진행 상태. 프론트에서 약관·언어·온보딩 값을 조합해 다시 계산하지 않음
      enum: [TERMS_REQUIRED, LANGUAGE_REQUIRED, ONBOARDING_REQUIRED, ACTIVE]
    OnboardingStep:
      type: string
      description: 앱이 중단된 온보딩을 이어서 표시할 화면
      enum: [LOCATION, TRAVEL_STYLES, PREFERENCE_PLACES, COMPLETED]
    SocialLinkType:
      type: string
      description: Buddy 프로필에서 사용자가 공개할 수 있는 SNS 종류
      enum: [INSTAGRAM, KAKAOTALK, THREADS, TIKTOK, ETC]
    AvailablePlaceTab:
      type: string
