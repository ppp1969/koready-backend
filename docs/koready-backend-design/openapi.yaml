      operationId: getBatchJobItems
      summary: 배치 item별 결과 조회
      description: |
        배치 상세에서 성공·실패한 개별 contentId, operation, 오류 코드를 cursor로 조회합니다.
        원천 payload나 secret은 포함하지 않으며 실패 원인 확인과 재시도 범위 선택에 사용합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Size100'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/BatchJobItemListSuccess'
  /admin/batch-jobs/{jobId}/retry:
    post:
      tags: [Admin Batch]
      operationId: retryBatchJob
      summary: 실패한 배치 item 재시도
      description: |
        원본 배치의 FAILED_ITEMS만 새 job으로 재시도합니다. 반환 202의 새 jobId를 원본 ID와 구분해 추적합니다.
        완료·실패 상태가 재시도 불가능하면 409를 처리하고 현재 배치 상태를 재조회합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR]
