        같은 deckId와 cursor 재요청은 같은 순서와 결과를 반환합니다. 프론트는 응답을 다시 섞거나 중복 제거 규칙을 재구현하지 않습니다.
        cursor를 생략하면 첫 페이지를 다시 조회하며 CARD_SERVED 기록과 30일 제한은 늘어나지 않습니다.
        페이지를 처음 반환하기 직전에 사용자 전체 노출 기록을 다시 확인합니다. 다른 덱에서 먼저 노출된 장소는
        이 페이지에서 제외되므로 cards가 요청한 size보다 적거나 비어 있을 수 있으며, 같은 cursor 재요청에는
        처음 확정된 결과를 그대로 반환합니다.
        다른 사용자의 덱, 만료된 덱과 잘못된 cursor는 모두 404로 처리해 덱 존재 여부를 노출하지 않습니다.
