      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          description: 임시 경로 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteEnvelope'
        '410':
          description: 임시 저장된 경로가 만료됨
