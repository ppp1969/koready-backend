                success: false
                code: HORI_TIP_CODE_DUPLICATED
                message: 이미 사용 중인 Hori Tip code입니다.
                errors:
                  - field: code
                    rejectedValue: TIP_GIMCHEON_GUMI_STATION
                    reason: code는 생성 후 재사용하거나 변경할 수 없습니다.
                traceId: trace-hori-tip-409-01
    AdminHoriTipDraftInvalid:
      description: Hori Tip 초안의 scope, trigger 또는 노출 기간이 유효하지 않음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            destinationScopeEmpty:
              summary: 목적지 지정 scope에 장소가 없음
              value:
                success: false
                code: HORI_TIP_RULE_INVALID
                message: Hori Tip 적용 범위와 매칭 규칙을 확인해 주세요.
                errors:
                  - field: scope.destinationPlaceIds
                    rejectedValue: '[]'
                    reason: DESTINATION_PLACES에는 장소가 1개 이상 필요합니다.
                traceId: trace-hori-tip-422-draft-01
    AdminHoriTipConflict:
      description: Hori Tip 보관 상태 또는 version 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            versionConflict:
              summary: 다른 운영자가 먼저 수정함
              value:
                success: false
                code: HORI_TIP_NOT_EDITABLE
                message: Hori Tip이 변경되었습니다. 최신 내용을 다시 조회해 주세요.
                errors:
                  - field: version
                    rejectedValue: '2'
                    reason: 현재 version과 일치하지 않습니다.
                traceId: trace-hori-tip-409-02
            archivedNotEditable:
              summary: 보관된 팁은 수정하거나 되돌릴 수 없음
              value:
                success: false
                code: HORI_TIP_NOT_EDITABLE
                message: 보관된 Hori Tip은 변경할 수 없습니다.
                errors:
                  - field: status
                    rejectedValue: ARCHIVED
                    reason: 새 Hori Tip 초안을 생성해 주세요.
                traceId: trace-hori-tip-409-03
    AdminHoriTipInvalid:
      description: Hori Tip 활성화 또는 매칭 규칙 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            activationInvalid:
              summary: ACTIVE 전환 필수 조건 누락
              value:
                success: false
                code: HORI_TIP_ACTIVATION_INVALID
                message: Hori Tip을 활성화하기 위한 조건을 확인해 주세요.
                errors:
                  - field: translations
                    rejectedValue: '[KO]'
                    reason: ACTIVE 상태에는 KO와 EN 본문이 모두 필요합니다.
                traceId: trace-hori-tip-422-01
            segmentTriggerRequired:
              summary: 구간 팁에 segment 조건이 없음
              value:
                success: false
                code: HORI_TIP_ACTIVATION_INVALID
                message: 구간 Hori Tip의 매칭 조건을 확인해 주세요.
                errors:
                  - field: trigger
                    rejectedValue: '{}'
                    reason: AFTER_SEGMENT에는 segment 조건이 1개 이상 필요합니다.
                traceId: trace-hori-tip-422-02
