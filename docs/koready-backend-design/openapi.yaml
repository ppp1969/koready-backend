      summary: 관광지 상세 조회
      description: |
        **호출 시점:** 월별 추천, 지도, 검색, 추천 덱, 저장 목록의 카드를 눌렀을 때 호출합니다.
        제목, 주소, 이미지, nullable 운영정보, 태그, 설명, 관련 장소, 저장 상태, availableTabs를 반환합니다.
        프론트는 availableTabs에 있는 DESCRIPTION, ROUTE, MATES만 노출하고 null 운영정보 행은 숨깁니다.
        로그인 전에도 호출할 수 있고 isSaved는 false입니다.

        **현재 MVP 데이터 범위:** KTO/관리 데이터에 근거가 있는 제목, 권역, 주소, 좌표, 대표 이미지와
        설명만 반환합니다. 아직 수집하지 않은 운영시간·휴무일·요금·주차 정보는 추측하지 않고 null입니다.
        대표 이미지가 없으면 images는 빈 배열이며, 설명 원문이 없으면 description은 null이고
        availableTabs에 DESCRIPTION이 포함되지 않습니다. TMAP과 Buddy 기능이 구현되기 전에는
        ROUTE와 MATES도 availableTabs에 넣지 않습니다.

        **언어:** Accept-Language가 en 계열이면 영문을 우선하고, 영문이 없으면 한국어로 대체합니다.
