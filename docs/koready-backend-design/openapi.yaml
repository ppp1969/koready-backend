  /recommendation-decks:
    post:
      tags: [Recommendation]
      operationId: createRecommendationDeck
      summary: K-Local Pick 추천 덱 생성
      description: |
        **호출 시점:** 추천 탭에 처음 들어가거나 근교/전국 범위를 새로 선택할 때 호출합니다.
        NEARBY는 실제 거리 반경이 아니라 출발 위치와 같은 서비스 권역입니다. originLocationId를 생략하면 기본 위치를 사용합니다.
        응답의 카드 순서를 그대로 표시하고 deckId와 nextCursor를 다음 페이지 호출까지 보관합니다.
        현재 데이터 단계에서는 사용자 여행 스타일이 장소 스타일과 일치하면 matchRank=2,
        일치하지 않는 확장 후보는 matchRank=3입니다. preference tag가 연결되는 온보딩 구현 뒤
        태그와 유형이 모두 일치하는 matchRank=1을 활성화합니다.
        deckId와 cursor는 내용을 해석할 수 없는 서버 저장 무작위 값이며 덱은 생성 뒤 24시간 동안 조회할 수 있습니다.
