        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/AuditLogListSuccess'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Cursor:
      name: cursor
      in: query
      description: 서버가 발급한 불투명 페이지 위치. 필터·정렬·언어가 같을 때만 그대로 재사용
      schema:
        type: string
        maxLength: 512
    Size50:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
    Size100:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    TravelStylesQuery:
      name: travelStyles
      in: query
      style: form
      explode: false
      schema:
        type: array
        maxItems: 7
        uniqueItems: true
        items:
          $ref: '#/components/schemas/TravelStyle'
    SortQuery:
      name: sort
      in: query
      schema:
        allOf:
          - $ref: '#/components/schemas/SortType'
        default: RECOMMENDED
    ServiceRegionCodeQueryRequired:
      name: serviceRegionCode
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/ServiceRegionCode'
    ServiceRegionCodeQueryOptional:
      name: serviceRegionCode
      in: query
      schema:
        $ref: '#/components/schemas/ServiceRegionCode'
    ExternalProviderQuery:
      name: provider
      in: query
      schema:
        $ref: '#/components/schemas/ExternalApiProvider'
    FromDateTime:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    ToDateTime:
      name: to
      in: query
      schema:
        type: string
        format: date-time
    LocationId:
      name: locationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    CandidateSetId:
      name: candidateSetId
      in: path
      required: true
      description: 관리자가 생성한 온보딩 큐레이션 세트의 opaque ID
      schema:
        type: string
    PlaceId:
      name: placeId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ProfileId:
      name: profileId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    DeckId:
      name: deckId
      in: path
      required: true
      schema:
        type: string
    RouteId:
      name: routeId
      in: path
      required: true
      schema:
        type: string
    HoriTipId:
      name: horiTipId
      in: path
      required: true
      description: 운영진이 관리하는 Hori Tip template ID
      schema:
        type: integer
        format: int64
    ThreadId:
      name: threadId
