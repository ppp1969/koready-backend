        refreshToken:
          type: string
          description: access token 재발급용 장기 token. 응답 수신 즉시 보안 저장소에 교체 저장
          example: rft_opaque_rotating_token
        accessTokenExpiresAt:
          type: string
          format: date-time
          example: '2026-07-13T13:00:00+09:00'
        refreshTokenExpiresAt:
          type: string
          format: date-time
          example: '2026-08-12T12:00:00+09:00'
