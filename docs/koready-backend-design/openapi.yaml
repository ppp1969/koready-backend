          required: [endpoint, requestParamsMasked, responseSummary]
          properties:
            endpoint:
              type: string
              format: uri
              description: secret query가 제거된 외부 endpoint
            requestParamsMasked:
              type: object
              description: provider별 요청 parameter map. secret과 개인정보는 마스킹 또는 제거됨
              additionalProperties:
                type: string
            responseSummary:
              $ref: '#/components/schemas/ExternalResponseSummary'
            error:
              type: object
              allOf:
                - $ref: '#/components/schemas/ExternalCallError'
              nullable: true
            relatedJob:
              type: object
              allOf:
                - $ref: '#/components/schemas/RelatedBatchJob'
              nullable: true
            rawSnapshot:
              type: object
              allOf:
                - $ref: '#/components/schemas/RelatedRawSnapshot'
              nullable: true
    ExternalResponseSummary:
      type: object
      properties:
        resultCode:
          type: string
          nullable: true
        resultMessage:
          type: string
          nullable: true
        totalCount:
          type: integer
          minimum: 0
          nullable: true
        itemCount:
          type: integer
          minimum: 0
          nullable: true
    ExternalCallError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
    RelatedBatchJob:
      type: object
      required: [jobId, jobType]
      properties:
        jobId:
          type: integer
          format: int64
        jobType:
          $ref: '#/components/schemas/BatchJobType'
    RelatedRawSnapshot:
      type: object
      required: [snapshotId, status, rawContentSha256, storedObjectSha256, byteSize]
      properties:
        snapshotId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/RawSnapshotStatus'
        rawContentSha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        storedObjectSha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        byteSize:
          type: integer
          format: int64
          minimum: 0
    RawSnapshotListEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RawSnapshotListResponse'
    RawSnapshotListResponse:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RawSnapshotResponse'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    RawSnapshotEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RawSnapshotResponse'
    RawSnapshotResponse:
      type: object
      required: [snapshotId, callLogId, provider, apiName, operation, storageFormat, contentType, rawContentSha256, storedObjectSha256, byteSize, compressedByteSize, capturedAt, retentionClass, immutable, downloadable]
      properties:
        snapshotId:
          type: integer
          format: int64
        callLogId:
          type: integer
          format: int64
        provider:
          $ref: '#/components/schemas/ExternalApiProvider'
        apiName:
          type: string
        operation:
          type: string
        storageFormat:
          type: string
          enum: [JSON_GZIP]
        contentType:
          type: string
          enum: [application/json]
        rawContentSha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
          description: 압축 전 원문 byte의 SHA-256
        storedObjectSha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
          description: object storage에 저장된 gzip byte의 SHA-256
        byteSize:
          type: integer
          format: int64
          minimum: 0
        compressedByteSize:
          type: integer
          format: int64
          minimum: 0
        itemCount:
          type: integer
          minimum: 0
          nullable: true
        capturedAt:
          type: string
          format: date-time
        retentionClass:
          type: string
          enum: [COMPETITION_EVIDENCE, TEMPORARY_PROVIDER_DATA, OPERATIONAL]
        retentionUntil:
          type: string
          format: date-time
          nullable: true
        immutable:
          type: boolean
          enum: [true]
        downloadable:
          type: boolean
    DownloadUrlEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DownloadUrlResponse'
    DownloadUrlResponse:
      type: object
      required: [downloadUrl, expiresAt]
      properties:
        downloadUrl:
          type: string
          format: uri
          description: 기본 5분 유효. 앱 저장소나 로그에 영구 보관하지 않음
        expiresAt:
          type: string
          format: date-time
        fileName:
          type: string
          nullable: true
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
          nullable: true
        rawContentSha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
          nullable: true
        storedObjectSha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
          nullable: true
    BatchJobListEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/BatchJobListResponse'
    BatchJobListResponse:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BatchJobResponse'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    BatchJobEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/BatchJobResponse'
    BatchJobResponse:
      type: object
      required: [jobId, jobType, status, processedCount, successCount, failureCount, createdAt]
      properties:
        jobId:
          type: integer
          format: int64
          example: 3001
        jobType:
          $ref: '#/components/schemas/BatchJobType'
        status:
          $ref: '#/components/schemas/BatchJobStatus'
        parameters:
          $ref: '#/components/schemas/BatchJobParameters'
        originalJobId:
          type: integer
          format: int64
          nullable: true
          description: retry job이면 원본 job ID
        processedCount:
          type: integer
          minimum: 0
        successCount:
          type: integer
          minimum: 0
        failureCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          nullable: true
        failureReason:
          type: string
          nullable: true
        requestedByUserId:
          type: integer
          format: int64
          nullable: true
    BatchJobItemListEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/BatchJobItemListResponse'
    BatchJobItemListResponse:
      type: object
      required: [jobId, items, hasMore]
      properties:
        jobId:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/BatchJobItemResponse'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    BatchJobItemResponse:
      type: object
      required: [itemId, operation, status, attemptCount, createdAt]
      properties:
        itemId:
          type: integer
          format: int64
        contentId:
          type: string
          nullable: true
          description: KTO contentId 등 개인정보가 아닌 외부 대상 식별자
        operation:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, SUCCEEDED, FAILED, SKIPPED]
        attemptCount:
          type: integer
          minimum: 0
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        relatedCallLogId:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
    SyncCursorListEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SyncCursorListResponse'
    SyncCursorListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SyncCursorResponse'
    SyncCursorEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SyncCursorResponse'
    SyncCursorResponse:
      type: object
      required: [cursorId, provider, operation, cursorType, cursorValue, enabled, failureCount, updatedAt]
      properties:
        cursorId:
          type: integer
          format: int64
        provider:
          $ref: '#/components/schemas/ExternalApiProvider'
        operation:
          type: string
          example: areaBasedSyncList2
        cursorType:
          type: string
          enum: [MODIFIED_TIME, PAGE, OPAQUE]
        cursorValue:
          type: string
          example: '20260713090000'
        enabled:
          type: boolean
        failureCount:
          type: integer
          minimum: 0
        lastSuccessAt:
          type: string
          format: date-time
          nullable: true
        lastFailureAt:
          type: string
          format: date-time
          nullable: true
        lastErrorCode:
          type: string
          nullable: true
        lastErrorMessage:
          type: string
          nullable: true
        nextRunAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
    EvidenceBundleStatus:
      type: string
      enum: [QUEUED, RUNNING, COMPLETED, FAILED]
    EvidenceBundleListEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/EvidenceBundleListResponse'
    EvidenceBundleListResponse:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceBundleResponse'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    EvidenceBundleEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/EvidenceBundleResponse'
    EvidenceBundleResponse:
      type: object
      required: [bundleId, name, status, period, providers, includeRawSnapshots, createdAt, excluded]
      properties:
        bundleId:
          type: string
          example: evidence_01J2ABCDEF
        name:
          type: string
          example: 2026 공모전 OpenAPI 사용 증빙
        status:
          $ref: '#/components/schemas/EvidenceBundleStatus'
        period:
          $ref: '#/components/schemas/DateTimePeriod'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ExternalApiProvider'
        operations:
          type: array
          items:
            type: string
        includeRawSnapshots:
          type: boolean
        fileName:
          type: string
          nullable: true
          example: koready-openapi-evidence-202607.zip
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
          nullable: true
        byteSize:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        callCount:
          type: integer
          minimum: 0
          nullable: true
        rawSnapshotCount:
          type: integer
          minimum: 0
          nullable: true
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        failureReason:
          type: string
          nullable: true
        excluded:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceExclusion'
        manifestFiles:
          type: array
          description: 완료된 번들에 실제 포함된 파일과 SHA-256 요약
          items:
            $ref: '#/components/schemas/EvidenceManifestFile'
    EvidenceExclusion:
      type: object
      required: [provider, reason]
      properties:
        provider:
          $ref: '#/components/schemas/ExternalApiProvider'
        reason:
          type: string
          enum: [PROVIDER_RETENTION_RESTRICTED, EXPIRED, NOT_REQUESTED, SAMPLE_LIMIT]
    EvidenceManifestFile:
      type: object
      required: [path, sha256, byteSize]
      properties:
        path:
          type: string
          example: open_api_calls.csv
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        byteSize:
          type: integer
          format: int64
          minimum: 0
    DataQualityEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DataQualityResponse'
    DataQualityResponse:
      type: object
      required: [generatedAt, places, localization]
      properties:
        generatedAt:
          type: string
          format: date-time
        places:
          $ref: '#/components/schemas/PlaceQualitySummary'
        localization:
          $ref: '#/components/schemas/LocalizationQualitySummary'
        lastSuccessfulSyncAt:
          type: string
          format: date-time
          nullable: true
    PlaceQualitySummary:
      type: object
      required: [total, active, missingImage, missingEnglish, missingCoordinates, missingAddress, curationReady]
      properties:
        total:
          type: integer
          minimum: 0
        active:
          type: integer
          minimum: 0
        missingImage:
          type: integer
          minimum: 0
        missingEnglish:
          type: integer
          minimum: 0
        missingCoordinates:
          type: integer
          minimum: 0
        missingAddress:
          type: integer
          minimum: 0
        curationReady:
          type: integer
          minimum: 0
    LocalizationQualitySummary:
      type: object
      required: [ktoEnglish, aiTranslated, manualEdited]
      properties:
        ktoEnglish:
          type: integer
          minimum: 0
        aiTranslated:
          type: integer
          minimum: 0
        manualEdited:
          type: integer
          minimum: 0
    AuditLogListEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuditLogListResponse'
    AuditLogListResponse:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminAuditLogResponse'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    AdminAuditLogResponse:
      type: object
      required: [auditLogId, actorUserId, actorRoles, action, targetType, targetId, occurredAt]
      properties:
        auditLogId:
          type: integer
          format: int64
        actorUserId:
          type: integer
          format: int64
        actorEmail:
          type: string
          format: email
          description: 관리자 화면 표시용이며 증빙 ZIP에는 포함하지 않음
        actorRoles:
          type: array
          items:
            type: string
            enum: [ADMIN, OPERATOR, AUDITOR]
        action:
          type: string
          example: RAW_SNAPSHOT_DOWNLOAD_URL_ISSUED
        targetType:
          type: string
          example: RAW_SNAPSHOT
        targetId:
          type: string
          example: '80001'
        reason:
          type: string
          nullable: true
        beforeSummary:
          type: object
          nullable: true
          description: secret과 개인정보가 제거된 변경 전 필드 map
          additionalProperties: true
        afterSummary:
          type: object
          nullable: true
          description: secret과 개인정보가 제거된 변경 후 필드 map
          additionalProperties: true
        traceId:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
    ApiFieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
          description: 요청 body 또는 query의 필드 경로
          example: travelStyles
        rejectedValue:
          type: string
          nullable: true
          description: 보안상 안전한 경우에만 반환하는 거절 값
        reason:
          type: string
          example: 1개 이상 4개 이하로 선택해야 합니다.
    SocialLinkInput:
      type: object
      required: [type, value]
      properties:
        type:
          $ref: '#/components/schemas/SocialLinkType'
        value:
          type: string
          minLength: 1
          maxLength: 200
          example: '@emma.travels'
    BatchJobParameters:
      type: object
      description: |
        jobType에 따라 사용하는 선택 필드가 다릅니다. KTO sync는 operations/pageSize,
        특정 상세 보강은 contentIds, 번역은 sourceLanguage/targetLanguage를 사용합니다.
      additionalProperties: false
      properties:
        operations:
          type: array
          uniqueItems: true
          items:
            type: string
          example: [areaBasedSyncList2]
        pageSize:
          type: integer
          minimum: 1
          maximum: 1000
          example: 500
        contentIds:
          type: array
          maxItems: 1000
          uniqueItems: true
          items:
            type: string
        sourceLanguage:
          $ref: '#/components/schemas/LanguageCode'
        targetLanguage:
          $ref: '#/components/schemas/LanguageCode'
        dryRun:
          type: boolean
          default: false
