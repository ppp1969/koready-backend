  /routes:
    post:
      tags: [Route]
      operationId: createRoute
      summary: Buddy Route 요약 생성
      description: |
        **호출 시점:** 장소 상세 이동 탭에서 출발 위치를 선택하고 경로 확인을 누를 때 호출합니다.
        저장 위치 ID와 목적지 placeId를 받아 TMAP 결과를 Koready 요약으로 정규화합니다.
        서버는 한 번의 상세 요청에서 후보 3개를 받아 departureAt에 운행 가능한 경로를 우선 선택합니다.
        정규화 경로를 준비한 뒤 현재 ACTIVE인 운영진 Hori Tip을 목적지와 trigger로 매칭해 summary 또는 segment에 조합합니다.
        Hori Tip 본문은 TMAP이나 AI가 생성하지 않으며 Route 캐시에 포함하지 않습니다.
        422 ROUTE_NOT_FOUND 또는 ROUTE_NOT_AVAILABLE_AT_DEPARTURE_TIME이면 조건 안내를 표시하고, 503이면 현재 화면을 유지한 채 재시도 버튼을 제공합니다.
      x-implementation-status: PLANNED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '201':
          description: 경로 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteEnvelope'
        '422':
          description: 요청 조건에서 사용할 수 있는 대중교통 경로 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                routeNotFound:
                  summary: 출발지와 목적지 사이의 대중교통 경로 없음
                  value:
                    success: false
                    code: ROUTE_NOT_FOUND
                    message: 선택한 출발지에서 이 장소로 가는 대중교통 경로를 찾지 못했습니다.
                    traceId: trace-route-422-01
                routeNotAvailableAtDepartureTime:
                  summary: 요청 출발 시각에 운행 가능한 후보 없음
                  value:
                    success: false
                    code: ROUTE_NOT_AVAILABLE_AT_DEPARTURE_TIME
                    message: 선택한 출발 시각에는 운행 가능한 대중교통 경로가 없습니다. 출발 시각을 변경해 주세요.
                    traceId: trace-route-422-02
        '503':
          description: TMAP 장애, 시간 초과 또는 호출 제한
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                routeProviderUnavailable:
                  summary: 경로 provider를 일시적으로 사용할 수 없음
                  value:
                    success: false
                    code: ROUTE_PROVIDER_UNAVAILABLE
                    message: 경로 정보를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.
                    traceId: trace-route-503-01
  /routes/{routeId}:
    get:
      tags: [Route]
      operationId: getRoute
      summary: Buddy Route 구간 상세 조회
      description: |
        **호출 시점:** 경로 요약에서 상세 경로 보기를 누를 때 호출합니다.
        segments의 order 순서로 도보, 버스, 지하철, 기차 등의 구간을 표시합니다.
        캐시된 정규화 경로에 현재 ACTIVE인 운영진 Hori Tip을 다시 매칭하므로 운영진의 비활성화가 기존 routeId에도 반영됩니다.
        410 ROUTE_EXPIRED면 같은 routeId를 반복하지 않고 POST /routes로 새 경로를 생성합니다.
      x-implementation-status: PLANNED
      parameters:
