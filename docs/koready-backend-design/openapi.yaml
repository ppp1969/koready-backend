      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryBatchJobRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '202':
          $ref: '#/components/responses/BatchJobAccepted'
