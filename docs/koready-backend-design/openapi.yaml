              $ref: '#/components/schemas/CreateBatchJobRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '202':
          $ref: '#/components/responses/BatchJobAccepted'
        '409':
          $ref: '#/components/responses/Conflict'
  /admin/batch-jobs/{jobId}:
