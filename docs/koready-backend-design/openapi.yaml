      parameters:
        - $ref: '#/components/parameters/BundleId'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/EvidenceBundleSuccess'
  /admin/evidence-bundles/{bundleId}/download-url:
