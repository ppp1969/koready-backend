openapi: 3.0.3
info:
  title: Koready API
  version: 1.0.0
  description: |
    Koready MVP 사용자 API와 OpenAPI 공모전 증빙 관리자 API의 기준 계약입니다.

    각 operation의 설명은 호출 화면, 선행 조건, 성공 후 프론트 행동을 포함합니다.
    `x-implementation-status=PLANNED`인 API는 Swagger 예제와 mock에만 사용하고 테스트 서버에서 호출하지 않습니다.
    전체 화면 흐름과 오류 처리 예제는 `10_FRONTEND_API_FLOW_GUIDE.md`를 참고합니다.
servers:
  - url: /api/v1
externalDocs:
  description: 프론트 개발자를 위한 화면별 호출 흐름과 오류 처리
  url: https://github.com/ppp1969/koready-backend/blob/main/docs/koready-backend-design/10_FRONTEND_API_FLOW_GUIDE.md
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: 소셜 로그인, token 재발급, 로그아웃
  - name: Terms
    description: 가입 약관 조회와 동의 저장
  - name: User
    description: 내 정보와 기본 표시 언어
  - name: Onboarding
    description: 위치, 여행 스타일, 관리자 큐레이션 여행지 선택
  - name: Location
    description: Kakao 기반 주소·학교·동네 검색과 사용자 저장 위치
  - name: Home
    description: 홈 화면 초기 데이터
  - name: Recommendation
    description: 월별 추천과 K-Local Pick 추천 덱
  - name: Place
    description: 관광지 검색, 권역 목록, 상세, 저장
  - name: Route
    description: TMAP 기반 Buddy Route 요약과 상세
  - name: Buddy
    description: Buddy 프로필과 장소별 메이트
  - name: Message
    description: 실시간 채팅이 아닌 스레드형 쪽지
  - name: Safety
    description: 차단, 차단 해제, 신고
  - name: Admin Curation
    description: 온보딩 선호 여행지 10개 큐레이션 세트 운영
  - name: Admin Hori Tip
    description: 운영진 Hori Tip 작성, 매칭 조건 편집, 활성·비활성·보관
  - name: Admin OpenAPI
    description: 외부 API 호출 현황과 원천 snapshot
  - name: Admin Batch
    description: 수집 배치와 동기화 cursor
  - name: Admin Evidence
    description: 관광공모전 증빙 번들
  - name: Admin Audit
    description: 데이터 품질과 관리자 감사 로그
paths:
  /auth/social/login:
    post:
      tags: [Auth]
      operationId: socialLogin
      summary: Google 또는 Apple 로그인
      description: |
        **호출 시점:** 사용자가 소셜 로그인 버튼을 누르고 provider token을 받은 직후 호출합니다.
        **보낼 값:** provider, idToken 또는 authorizationCode, 기기별 deviceId를 보냅니다.
        **성공 후:** access/refresh token을 보안 저장소에 저장하고 `nextStep` 값으로 약관, 언어, 온보딩, 홈 중 다음 화면을 선택합니다.
        신규 가입 여부나 다음 화면을 프론트가 직접 계산하지 않습니다.
      x-implementation-status: PLANNED
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/TokenSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: 만료된 access token 재발급
      description: |
        **호출 시점:** 일반 API가 401을 반환했을 때 interceptor가 한 번만 호출합니다.
        **보낼 값:** 현재 refreshToken과 로그인 당시 deviceId입니다.
        **성공 후:** 기존 access/refresh token을 모두 새 값으로 교체하고 실패했던 원 요청을 한 번 재시도합니다.
        refresh도 401이면 token을 삭제하고 로그인 화면으로 이동합니다.
      x-implementation-status: PLANNED
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/TokenSuccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: 현재 기기 로그아웃
      description: |
        **호출 시점:** 사용자가 로그아웃을 확정했을 때 호출합니다.
        **성공 후:** 204 응답에는 body가 없으므로 JSON parsing을 하지 않고 로컬 token, 사용자 cache, 개인 화면 상태를 삭제합니다.
      x-implementation-status: PLANNED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '204':
          description: 로그아웃 성공
  /terms/required:
    get:
      tags: [Terms]
      operationId: getRequiredTerms
      summary: 현재 적용 약관 조회
      description: |
        **호출 시점:** 로그인 응답의 `nextStep=TERMS`이거나 약관 화면에 다시 진입할 때 호출합니다.
        응답의 termVersionId, required, agreed를 기준으로 체크박스를 구성합니다. 화면 순번을 ID로 사용하지 않습니다.
      x-implementation-status: PLANNED
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/TermsRequiredSuccess'
  /users/me/term-agreements:
    put:
      tags: [Terms]
      operationId: updateMyTermAgreements
      summary: 약관 동의 상태 저장
      description: |
        **호출 시점:** 약관 화면에서 다음 버튼을 누를 때 호출합니다.
        **성공 후:** 언어 선택 화면으로 이동합니다.
        필수 약관이 거부되면 422 `REQUIRED_TERMS_NOT_AGREED`를 반환하므로 해당 체크박스로 안내합니다.
      x-implementation-status: PLANNED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TermAgreementsRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/TermAgreementSuccess'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /users/me:
    get:
      tags: [User]
      operationId: getMe
      summary: 내 계정과 가입 진행 상태 조회
      description: |
        **호출 시점:** 앱 재실행 후 사용자 session을 복구하거나 마이 화면을 열 때 호출합니다.
        응답의 signupStatus, preferredLanguage, defaultLocationId를 앱 전역 사용자 상태의 기준으로 사용합니다.
      x-implementation-status: PLANNED
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/MyUserSuccess'
  /users/me/language:
    patch:
      tags: [User]
      operationId: updateMyLanguage
      summary: 기본 표시 언어 변경
      description: |
        **호출 시점:** 온보딩 언어 화면 또는 홈 언어 toggle에서 KO/EN을 선택할 때 호출합니다.
        성공 후 앱 i18n 상태와 이후 요청의 Accept-Language를 같은 언어로 갱신합니다.
      x-implementation-status: PLANNED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LanguageRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/LanguageSuccess'
  /users/me/onboarding:
    get:
      tags: [Onboarding]
      operationId: getMyOnboarding
      summary: 온보딩 진행 상태 복구
      description: |
        **호출 시점:** 로그인 응답이 `nextStep=ONBOARDING`이거나 온보딩 화면을 재진입할 때 호출합니다.
        `currentStep`을 기준으로 위치, 스타일, 선호 여행지 중 이어서 보여줄 화면을 결정합니다.
      x-implementation-status: PLANNED
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/OnboardingProgressSuccess'
    put:
      tags: [Onboarding]
      operationId: completeMyOnboarding
      summary: 온보딩 전체 선택값 검증 및 완료
      description: |
        **호출 시점:** 관리자 큐레이션 10개 중 1~3개를 선택하고 완료 버튼을 누를 때 호출합니다.
        위치 소유권, 스타일 1~4개, candidateSetId/version, 후보 포함 여부를 한 transaction에서 검증합니다.
        성공 응답의 completed=true를 확인한 뒤 홈으로 이동합니다. 같은 본문 재요청은 멱등 처리합니다.
      x-implementation-status: PLANNED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/OnboardingCompletionSuccess'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /onboarding/place-candidate-sets/current:
    get:
      tags: [Onboarding]
      operationId: getCurrentOnboardingPlaceCandidateSet
      summary: 현재 발행된 선호 여행지 후보 10개 조회
      description: |
        **호출 시점:** 온보딩 마지막 선호 여행지 화면에 진입할 때 한 번 호출합니다.
        사용자별 추천 생성 API가 아니라 관리자가 검수해 발행한 공통 불변 버전을 반환합니다.
        프론트는 candidateSetId와 version을 선택한 placeId 1~3개와 함께 완료 요청까지 보관합니다.
      x-implementation-status: IMPLEMENTED
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '200':
          description: 현재 발행된 큐레이션 후보 10개
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateSetEnvelope'
  /locations/search:
    get:
      tags: [Location]
      operationId: searchLocations
      summary: Kakao 기반 주소·학교·동네 검색
      description: |
        **호출 시점:** 위치 검색어 입력을 300~500ms debounce한 뒤 호출합니다.
        백엔드가 Kakao 주소 검색과 키워드 검색을 합치고 중복 제거, 주소 정규화, 7개 권역 매핑을 수행합니다.
        결과 없음은 200 `items=[]`입니다. 선택한 항목의 `searchResultToken`만 위치 저장 요청에 사용합니다.
      x-implementation-status: PLANNED
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          description: 정규화된 위치 검색 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationSearchEnvelope'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /users/me/locations:
    get:
      tags: [Location]
      operationId: getMyLocations
      summary: 내 저장 위치 목록 조회
      description: |
        **호출 시점:** 마이 위치 관리, 홈 위치 변경, 경로 출발지 선택 화면에서 호출합니다.
        `default=true` 위치를 강조하고 삭제된 위치는 응답에 포함되지 않습니다.
      x-implementation-status: PLANNED
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/UserLocationListSuccess'
    post:
      tags: [Location]
      operationId: createMyLocation
      summary: 검색 결과를 내 위치로 저장
      description: |
        **호출 시점:** 사용자가 Kakao 검색 결과 하나를 선택하고 저장을 확정할 때 호출합니다.
        주소·좌표를 다시 보내지 않고 `searchResultToken`, 선택적 customLabel, setDefault만 보냅니다.
        410 `LOCATION_SEARCH_RESULT_EXPIRED`면 같은 검색어로 재검색하도록 안내합니다.
      x-implementation-status: PLANNED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '201':
          description: 저장된 사용자 위치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLocationEnvelope'
        '410':
          $ref: '#/components/responses/Gone'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /users/me/locations/{locationId}/default:
    put:
      tags: [Location]
      operationId: setMyDefaultLocation
      summary: 기본 위치 변경
      description: |
        **호출 시점:** 저장 위치 목록에서 기본 위치를 바꿀 때 호출합니다.
        성공 후 홈, 월별 추천, 추천 덱 관련 query cache를 무효화하고 새 위치 기준으로 다시 조회합니다.
      x-implementation-status: PLANNED
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/UserLocationSuccess'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/me/locations/{locationId}:
    delete:
      tags: [Location]
      operationId: deleteMyLocation
      summary: 저장 위치 삭제
      description: |
        **호출 시점:** 위치 관리 화면에서 삭제를 확정할 때 호출합니다.
        204 body는 없습니다. 기본 위치를 삭제했다면 목록을 재조회해 새 기본 위치 또는 위치 없음 상태를 반영합니다.
      x-implementation-status: PLANNED
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '204':
          description: 위치 삭제 성공
        '404':
          $ref: '#/components/responses/NotFound'
  /home:
    get:
      tags: [Home]
      operationId: getHome
      summary: 홈 화면 초기 데이터 조회
      description: |
        **호출 시점:** 온보딩 완료 후 홈 진입, 앱 재실행, pull-to-refresh에서 호출합니다.
        기본 위치, 기본 언어, 현재 연도·월 추천 미리보기를 한 번에 반환합니다.
        현재 월 축제는 ONGOING, UPCOMING 회차를 ENDED 회차보다 우선해 정렬합니다.
        currentLocation이 null이면 위치 등록 화면으로 이동하며 KTX 가이드는 프론트 정적 콘텐츠라 응답에 포함하지 않습니다.
      x-implementation-status: PLANNED
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/HomeSuccess'
  /monthly-recommendations:
    get:
      tags: [Recommendation]
      operationId: getMonthlyRecommendations
      summary: 월별 추천 전체보기 조회
      description: |
        **호출 시점:** 홈의 월별 추천 전체보기를 열거나 월, 권역, 날짜, 관광유형, 정렬 필터를 바꿀 때 호출합니다.
        로그인 없이 호출할 수 있으며 익명 응답의 saved는 항상 false입니다.

        **행사 선택 규칙:** year/month는 행사 시작일만 보는 값이 아니라 개최 기간이 하루라도 겹치는 연월입니다.
        활성·공개 장소에 연결된 유효 회차 중 visibleFrom이 지났고 시작일까지 6개월 이내인 행사만 조회합니다.
        종료 뒤에도 해당 개최 연월의 ALL 목록에는 ENDED 상태로 남습니다. 같은 축제의 연도별 회차는
        occurrenceId, eventYear, startDate, endDate가 서로 다른 항목으로 반환됩니다.

        **날짜 필터:** ALL은 선택 연월 전체, THIS_WEEK는 서울 오늘이 속한 월요일~일요일,
        THIS_MONTH는 서울 오늘이 속한 달, NEXT_MONTH는 서울 오늘의 다음 달입니다. CUSTOM이면
        customStartDate와 customEndDate가 모두 필요하고 시작일은 종료일보다 늦을 수 없습니다.
        모든 날짜 필터는 선택한 year/month와 교집합으로 적용하며 교집합이 없으면 200과 빈 items를 반환합니다.

        **정렬과 다음 페이지:** RECOMMENDED는 ONGOING, UPCOMING, ENDED 순서를 품질 점수보다 먼저 적용하고,
        DEADLINE은 행사 종료일이 빠른 순서입니다. totalCount는 현재 필터의 전체 회차 수입니다.
        필터가 바뀌면 기존 items와 cursor를 폐기하고 첫 페이지부터 다시 조회합니다.
        cursor를 다른 필터, 언어, 정렬에 재사용하면 400 INVALID_CURSOR입니다.
      security: []
      x-implementation-status: IMPLEMENTED
      parameters:
        - name: year
          in: query
          required: true
          description: 행사 개최 연도. 반복 축제의 이전 회차와 현재 회차를 구분합니다.
          schema:
