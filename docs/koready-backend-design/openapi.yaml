  /places/search:
    get:
      tags: [Place]
      operationId: searchPlaces
      summary: KoReady 관광지 검색
      description: |
        **호출 시점:** 관광지명·지역명 검색 화면에서 호출합니다.
        이 API는 KoReady DB에 적재된 관광지를 검색하며 사용자 주소를 찾는 `/locations/search`와 다릅니다.
        로그인 전에도 호출할 수 있으며 이때 모든 카드의 saved는 false입니다.

        **호출 흐름:** 첫 요청에는 query와 size만 보내고, 응답의 hasMore가 true이면 같은 query,
        size, Accept-Language와 함께 nextCursor를 그대로 cursor에 넣어 다음 페이지를 요청합니다.
        query 또는 언어가 바뀌면 기존 items와 cursor를 폐기하고 첫 페이지부터 다시 조회합니다.
        cursor는 서버 정렬 위치와 검색 조건을 묶은 불투명 값이므로 프론트에서 해석하거나 만들지 않습니다.

        **검색 규칙:** 앞뒤 공백과 연속 공백은 서버가 정리합니다. `%`, `_`는 일반 문자로 검색되며
        SQL wildcard로 동작하지 않습니다. active와 showFlag가 모두 true인 장소만 반환합니다.
        Accept-Language가 en 계열이면 영문을 우선하고 영문이 없는 장소는 한국어로 대체합니다.
      security: []
      x-implementation-status: IMPLEMENTED
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Size50'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '200':
          $ref: '#/components/responses/PlaceListSuccess'
  /places:
    get:
      tags: [Place]
