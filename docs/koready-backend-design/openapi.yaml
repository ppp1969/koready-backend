      summary: 선택한 지도 권역의 관광지 조회
      description: |
        **호출 시점:** 프론트 정적 지도에서 7개 권역 중 하나를 선택할 때 호출합니다.
        serviceRegionCode는 필수이고 관광유형, 정렬, cursor, size는 선택입니다.
        GPS, bbox, zoom, 지도 중심 좌표는 사용하지 않으며 단순 확대·축소로 재호출하지 않습니다.
        로그인 전에도 호출할 수 있으며 이때 모든 카드의 saved는 false입니다.

        **관광유형:** travelStyles를 여러 개 보내면 그중 하나 이상에 매핑된 장소를 반환합니다.
        예: `travelStyles=NATURE,LOCAL_FESTIVAL`. 빈 값이면 유형으로 제한하지 않습니다.

        **정렬:** RECOMMENDED는 데이터 품질점수가 높은 순서이고 같은 점수는 최신 내부 ID 순서입니다.
        DEADLINE은 현재 노출 가능한 진행·예정 축제의 종료일이 가까운 장소를 먼저 배치하고,
        축제 회차가 없는 장소는 뒤에 배치합니다. 사용자 개인화 점수는 로그인 기능 이후 별도 적용합니다.

        **다음 페이지:** 첫 요청에는 cursor를 보내지 않습니다. hasMore=true이면 같은 권역, 관광유형,
        sort, size, Accept-Language로 nextCursor를 그대로 전달합니다. 조건이 하나라도 바뀌면 cursor를 버립니다.
      security: []
      x-implementation-status: IMPLEMENTED
      parameters:
        - $ref: '#/components/parameters/ServiceRegionCodeQueryRequired'
        - $ref: '#/components/parameters/TravelStylesQuery'
        - $ref: '#/components/parameters/SortQuery'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Size50'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '200':
          $ref: '#/components/responses/PlaceListSuccess'
  /places/{placeId}:
    get:
