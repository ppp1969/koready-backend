      operationId: getBatchJob
      summary: 배치 실행 상태와 통계 조회
      description: |
        jobId의 PENDING, RUNNING, COMPLETED, FAILED, PARTIAL_FAILED 상태와 처리 통계를 조회합니다.
        실행 중에는 과도한 polling을 피하고 점진적으로 간격을 늘립니다.
