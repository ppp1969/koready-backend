        INACTIVE 전환은 기존 routeId의 다음 조회부터 팁을 제외합니다. ARCHIVED는 되돌릴 수 없으며 물리 삭제하지 않습니다.
        version과 변경 사유를 함께 받아 상태 경쟁을 막고 감사 로그에 actor와 이전·이후 값을 기록합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR]
      parameters:
        - $ref: '#/components/parameters/HoriTipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHoriTipStatusRequest'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/AdminHoriTipSuccess'
        '409':
          $ref: '#/components/responses/AdminHoriTipConflict'
        '422':
          $ref: '#/components/responses/AdminHoriTipInvalid'
  /admin/open-api/summary:
    get:
      tags: [Admin OpenAPI]
      operationId: getOpenApiSummary
      summary: 외부 API 호출 현황 요약
      description: |
        관리자 대시보드 첫 진입과 기간/provider 필터 변경 시 호출합니다.
        전체·성공·실패 호출 수, 성공률, snapshot 수와 provider별 상태를 반환하며 사용자 화면에서는 호출하지 않습니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      parameters:
        - $ref: '#/components/parameters/FromDateTime'
        - $ref: '#/components/parameters/ToDateTime'
        - $ref: '#/components/parameters/ExternalProviderQuery'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/OpenApiSummarySuccess'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/open-api/calls:
    get:
      tags: [Admin OpenAPI]
      operationId: getOpenApiCalls
      summary: 외부 API 호출 로그 목록 조회
      description: |
        provider, operation, 성공 여부, 기간으로 마스킹된 호출 로그를 검색합니다.
        secret, Kakao 검색어, 상세 주소, TMAP 좌표는 응답에 포함되지 않으며 cursor로 다음 페이지를 조회합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      parameters:
        - $ref: '#/components/parameters/ExternalProviderQuery'
        - name: operation
          in: query
          schema:
            type: string
        - name: success
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/FromDateTime'
        - $ref: '#/components/parameters/ToDateTime'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Size100'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/OpenApiCallListSuccess'
  /admin/open-api/calls/{callLogId}:
    get:
      tags: [Admin OpenAPI]
      operationId: getOpenApiCall
      summary: 외부 API 호출 로그 상세 조회
      description: |
        호출 목록에서 한 건을 선택했을 때 상태, 지연시간, item 수, 관련 batch와 snapshot 계보를 조회합니다.
        원천 본문 자체는 이 API가 아니라 snapshot 권한과 단기 download URL을 사용합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      parameters:
        - $ref: '#/components/parameters/CallLogId'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/OpenApiCallSuccess'
  /admin/open-api/snapshots:
    get:
      tags: [Admin OpenAPI]
      operationId: getOpenApiSnapshots
      summary: KTO 원천 snapshot 목록 조회
      description: |
        KTO 성공 응답을 가공 전에 보존한 immutable snapshot 메타데이터를 검색합니다.
        provider, operation, 기간과 cursor를 사용하며 원천 파일 내용은 목록 응답에 포함하지 않습니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      parameters:
        - $ref: '#/components/parameters/ExternalProviderQuery'
        - name: operation
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/FromDateTime'
        - $ref: '#/components/parameters/ToDateTime'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Size100'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/RawSnapshotListSuccess'
  /admin/open-api/snapshots/{snapshotId}:
    get:
      tags: [Admin OpenAPI]
      operationId: getOpenApiSnapshot
      summary: KTO 원천 snapshot 메타데이터 조회
      description: |
        원문 SHA-256, gzip 객체 SHA-256, 크기, storage key, callLogId와 보관 상태를 조회합니다.
        hash를 화면 표시 문자열로만 다루고 프론트에서 원천 파일 무결성을 새 규칙으로 계산하지 않습니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      parameters:
        - $ref: '#/components/parameters/SnapshotId'
      responses:
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          $ref: '#/components/responses/RawSnapshotSuccess'
