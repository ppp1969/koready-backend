      description: |
        완료된 증빙 번들의 signed URL을 발급합니다. URL은 저장하거나 공유 문서에 고정하지 않고 만료 시 다시 발급합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, OPERATOR, AUDITOR]
      parameters:
        - $ref: '#/components/parameters/BundleId'
