      operationId: getAdminAuditLogs
      summary: 관리자 변경 감사 로그 조회
      description: |
        큐레이션 발행·보관, 배치 실행·재시도, cursor 설정, 다운로드 URL 발급 이력을 기간별로 조회합니다.
        감사 로그는 수정·삭제 UI를 제공하지 않고 actor, action, target, before/after 요약을 표시합니다.
      x-implementation-status: PLANNED
      x-required-roles: [ADMIN, AUDITOR]
      parameters:
        - $ref: '#/components/parameters/FromDateTime'
        - $ref: '#/components/parameters/ToDateTime'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Size100'
