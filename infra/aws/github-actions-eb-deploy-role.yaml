AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub OIDC deployment role for the KoReady Elastic Beanstalk staging environment.

Parameters:
  GitHubRepository:
    Type: String
    Default: ppp1969/koready-backend
    AllowedPattern: '[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+'

  BeanstalkApplicationName:
    Type: String
    Default: koready-backend
    AllowedPattern: '[A-Za-z0-9._-]{1,100}'

  BeanstalkEnvironmentName:
    Type: String
    Default: koready-staging-eb
    AllowedPattern: '[A-Za-z0-9._-]{1,100}'

  BeanstalkEnvironmentId:
    Type: String
    Default: e-krckrp4cre
    AllowedPattern: 'e-[a-z0-9]{10}'

  BeanstalkArtifactBucketName:
    Type: String
    Description: Existing Elastic Beanstalk managed S3 bucket in the same AWS region.
    AllowedPattern: '[a-z0-9.-]{3,63}'

Resources:
  GitHubActionsEbDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: KoreadyGitHubActionsEbDeployRole
      Description: Deploys main branch builds from GitHub Actions to the KoReady EB staging environment.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GitHubActionsMainBranchOnly
            Effect: Allow
            Principal:
              Federated:
                Fn::Sub: 'arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  Fn::Sub: 'repo:${GitHubRepository}:ref:refs/heads/main'
      Policies:
        - PolicyName: UploadBeanstalkSourceBundle
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SourceBundleBucketLocation
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                Resource:
                  Fn::Sub: 'arn:${AWS::Partition}:s3:::${BeanstalkArtifactBucketName}'

              - Sid: BeanstalkManagedBucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  Fn::Sub: 'arn:${AWS::Partition}:s3:::${BeanstalkArtifactBucketName}'
              - Sid: BeanstalkManagedObjectMetadata
                Effect: Allow
                Action:
                  - s3:GetObjectAcl
                Resource:
                  Fn::Sub: 'arn:${AWS::Partition}:s3:::${BeanstalkArtifactBucketName}/*'
              - Sid: SourceBundleObject
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  Fn::Sub: 'arn:${AWS::Partition}:s3:::${BeanstalkArtifactBucketName}/resources/${BeanstalkApplicationName}/github-actions/*'
              - Sid: EnvironmentEmbeddedExtensions
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource:
                  - Fn::Sub: 'arn:${AWS::Partition}:s3:::${BeanstalkArtifactBucketName}/resources/environments/${BeanstalkEnvironmentId}/_runtime/_embedded_extensions/${BeanstalkApplicationName}/*'
                  - Fn::Sub: 'arn:${AWS::Partition}:s3:::${BeanstalkArtifactBucketName}/resources/_runtime/_embedded_extensions/${BeanstalkApplicationName}/*'
              - Sid: EnvironmentApplicationVersions
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:DeleteObject
                Resource:
                  Fn::Sub: 'arn:${AWS::Partition}:s3:::${BeanstalkArtifactBucketName}/resources/environments/${BeanstalkEnvironmentId}/_runtime/_versions/${BeanstalkApplicationName}/*'
              - Sid: EnvironmentStackTemplate
                Effect: Allow
                Action:
                  - cloudformation:GetTemplate
                  - cloudformation:DescribeStackResource
                Resource:
                  Fn::Sub: 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/awseb-${BeanstalkEnvironmentId}-stack/*'
        - PolicyName: UpdateKoreadyBeanstalkEnvironment
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CreateAndInspectApplicationVersions
                Effect: Allow
                Action:
                  - elasticbeanstalk:CreateApplicationVersion
                  - elasticbeanstalk:DescribeApplicationVersions
                Resource: '*'
              - Sid: UpdateAndInspectStagingEnvironment
                Effect: Allow
                Action:
                  - elasticbeanstalk:DescribeEnvironments
                  - elasticbeanstalk:DescribeEvents
                  - elasticbeanstalk:UpdateEnvironment
                Resource: '*'
              - Sid: InspectBeanstalkAutoScalingGroup
                Effect: Allow
                Action:
                  - autoscaling:DescribeAutoScalingGroups
                Resource: '*'

Outputs:
  GitHubActionsEbDeployRoleArn:
    Description: Set this value as the AWS_EB_DEPLOY_ROLE_ARN GitHub Actions variable.
    Value:
      Fn::GetAtt:
        - GitHubActionsEbDeployRole
        - Arn
  GitHubRepository:
    Description: Repository allowed to assume the deployment role from main only.
    Value:
      Ref: GitHubRepository
  BeanstalkEnvironmentName:
    Description: Environment the role is intended to update.
    Value:
      Ref: BeanstalkEnvironmentName
