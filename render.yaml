services:
  - type: web
    name: koready-backend-staging
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: checksPass
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: staging
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        value: defaultdb
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: require
      - key: DB_POOL_SIZE
        value: 3
      - key: DB_MIN_IDLE
        value: 1
      - key: KTO_BATCH_PAGE_SIZE
        value: 200
      - key: KTO_BATCH_FLUSH_SIZE
        value: 50
      - key: KTO_BATCH_MAX_CONCURRENCY
        value: 1
      # Render is the Swagger sharing environment. KTO collection runs only on EB.
      - key: KTO_MANUAL_BATCH_WORKER_ENABLED
        value: false
      - key: KTO_MAX_RESPONSE_BYTES
        value: 4194304
      - key: KTO_CONNECT_TIMEOUT
        value: 3s
      - key: KTO_READ_TIMEOUT
        value: 10s
      - key: JWT_SECRET
        generateValue: true
      - key: KTO_SERVICE_KEY
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: TMAP_APP_KEY
        sync: false
