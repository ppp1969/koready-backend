services:
  - type: web
    name: koready-backend-staging
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: checksPass
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: staging
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        value: defaultdb
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: require
      - key: DB_POOL_SIZE
        value: 5
      - key: JWT_SECRET
        generateValue: true
      - key: KTO_SERVICE_KEY
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: TMAP_APP_KEY
        sync: false
