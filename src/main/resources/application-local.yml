spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:${DB_PORT:3306}/${DB_DATABASE:koready}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:koready}
    password: ${DB_PASSWORD:koready-local}
  flyway:
    enabled: true

logging:
  level:
    koready_backend: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

koready:
  location:
    search:
      provider: local
      token-secret: local-only-location-search-token-secret-change-me
  security:
    dev-principal:
      enabled: ${LOCAL_DEV_AUTH_ENABLED:true}
