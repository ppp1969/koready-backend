spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_DATABASE:defaultdb}?sslmode=${DB_SSL_MODE:require}&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}
  flyway:
    enabled: true

logging:
  level:
    root: INFO
    koready_backend: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
