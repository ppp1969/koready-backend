spring:
  application:
    name: koready-backend
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  address: 0.0.0.0
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:local}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    disable-swagger-default-url: true
    url: /openapi/koready.yaml

koready:
  location:
    search:
      provider: ${LOCATION_SEARCH_PROVIDER:disabled}
      token-secret: ${LOCATION_SEARCH_TOKEN_SECRET:}
      token-ttl: ${LOCATION_SEARCH_TOKEN_TTL:10m}
    kakao:
      base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
      rest-api-key: ${KAKAO_REST_API_KEY:}
      max-response-bytes: ${KAKAO_LOCAL_MAX_RESPONSE_BYTES:524288}
      connect-timeout: ${KAKAO_LOCAL_CONNECT_TIMEOUT:3s}
      read-timeout: ${KAKAO_LOCAL_READ_TIMEOUT:5s}
  kto:
    api:
      base-url: ${KTO_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
      service-key: ${KTO_SERVICE_KEY:}
      max-response-bytes: ${KTO_MAX_RESPONSE_BYTES:4194304}
      connect-timeout: ${KTO_CONNECT_TIMEOUT:3s}
      read-timeout: ${KTO_READ_TIMEOUT:10s}
      mobile-os: ${KTO_MOBILE_OS:ETC}
      mobile-app: ${KTO_MOBILE_APP:KoReady}
    batch:
      page-size: ${KTO_BATCH_PAGE_SIZE:200}
      flush-size: ${KTO_BATCH_FLUSH_SIZE:50}
      max-concurrency: ${KTO_BATCH_MAX_CONCURRENCY:1}
    snapshot:
      storage: ${KTO_SNAPSHOT_STORAGE:local}
      directory: ${KTO_SNAPSHOT_DIRECTORY:${user.home}/.koready/kto-snapshots}
      download:
        expiration: ${KTO_SNAPSHOT_DOWNLOAD_EXPIRATION:5m}
      s3:
        bucket: ${KTO_SNAPSHOT_S3_BUCKET:}
        region: ${AWS_REGION:ap-northeast-2}
        connect-timeout: ${KTO_SNAPSHOT_S3_CONNECT_TIMEOUT:3s}
        read-timeout: ${KTO_SNAPSHOT_S3_READ_TIMEOUT:10s}
