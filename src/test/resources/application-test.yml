spring:
  datasource:
    url: jdbc:h2:mem:koready;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

koready:
  location:
    search:
      provider: local
      token-secret: test-only-location-search-token-secret-change-me
